<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Defect Operations Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
html, body {
  margin:0;
  padding:0;
  font-family:Segoe UI, sans-serif;
  background:#f5f3ef;
  overflow-x:hidden; /* remove horizontal scroll */
}

/* container */
.dashboard {
  max-width:1200px;
  margin:0 auto;
  padding:20px 16px 40px; /* extra top padding */
}

/* grid */
.grid {
  display:grid;
  grid-template-columns: 1fr 1fr;
  gap:16px;
}

/* card */
.card {
  background:#fff;
  border-radius:14px;
  padding:16px;
  box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

/* charts */
canvas {
  width:100% !important;
  height:250px !important;
}

/* SLA */
.sla-box {
  position:relative;
  height:260px;
}

.sla-summary {
  position:absolute;
  top:10px;
  right:16px;
  font-size:13px;
  text-align:right;
}

.sla-summary .met {color:#1a7f37;font-weight:600;}
.sla-summary .missed {color:#d9534f;font-weight:600;}

.sla-chart {
  display:flex;
  align-items:center;
  justify-content:center;
  height:100%;
}

.sla-center {
  position:absolute;
  font-size:34px;
  font-weight:700;
}

/* AI drawer */
.ai-drawer {
  position:fixed;
  right:0;
  top:0;
  width:320px;
  height:100vh;
  background:#fff;
  box-shadow:-2px 0 10px rgba(0,0,0,0.1);
  display:none;
  flex-direction:column;
  z-index:999;
}

.ai-content {
  display:flex;
  flex-direction:column;
  height:100%;
  padding:16px;
}

.ai-input {
  margin-top:auto;
}

textarea {
  width:100%;
  height:90px; /* fixed height fix */
  resize:none;
}

/* button */
.ask-btn {
  position:fixed;
  bottom:16px;
  right:16px;
  background:#6c63ff;
  color:#fff;
  border:none;
  padding:10px 16px;
  border-radius:8px;
  cursor:pointer;
  z-index:999;
}

</style>
</head>

<body>

<div class="dashboard">

<h2>Defect Operations Dashboard</h2>

<div class="grid">

<!-- Trend -->
<div class="card">
<h3>Created vs Closed</h3>
<canvas id="trend"></canvas>
</div>

<!-- SLA -->
<div class="card sla-box">
<h3>4-Week Target Compliance</h3>

<div class="sla-summary">
<div class="met">Met: 34</div>
<div class="missed">Missed: 18</div>
</div>

<div class="sla-chart">
<canvas id="sla"></canvas>
<div class="sla-center">65%</div>
</div>

</div>

</div>

</div>

<!-- AI -->
<div class="ai-drawer" id="aiDrawer">
<div class="ai-content">
<h3>AI Insights</h3>

<div class="ai-input">
<textarea placeholder="Ask something..."></textarea>
<br><br>
<button>Generate Insight</button>
</div>

</div>
</div>

<button class="ask-btn" onclick="toggleAI()">Ask AI</button>

<script>

/* Trend Chart */
new Chart(document.getElementById('trend'), {
  type:'line',
  data:{
    labels:['Oct','Nov','Dec','Jan','Feb'],
    datasets:[
      {label:'Created',data:[10,15,20,18,14],borderColor:'#007bff'},
      {label:'Closed',data:[12,14,18,22,11],borderColor:'#28a745'}
    ]
  }
});

/* SLA Donut */
new Chart(document.getElementById('sla'), {
  type:'doughnut',
  data:{
    datasets:[{
      data:[34,18],
      backgroundColor:['#2e8b57','#e5e5e5'],
      borderWidth:0
    }]
  },
  options:{
    cutout:'75%', /* thin ring */
    plugins:{legend:{display:false}}
  }
});

/* AI Toggle */
function toggleAI(){
  let el = document.getElementById('aiDrawer');
  el.style.display = el.style.display === 'flex' ? 'none' : 'flex';
}

</script>

</body>
</html>
