<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Defect Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
html, body {
  margin:0;
  padding:0;
  font-family:Segoe UI, sans-serif;
  background:#f5f3ef;
  overflow-x:hidden;
}

/* Container */
.dashboard-container{
  max-width:1200px;
  margin:0 auto;
  padding:20px 16px;
}

/* Cards */
.card{
  background:#fff;
  border-radius:14px;
  padding:16px;
  box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

/* Grid */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
  gap:16px;
}

/* SLA Widget */
.sla-container{
  position:relative;
  height:220px;
}

.sla-summary{
  position:absolute;
  top:8px;
  right:12px;
  font-size:12px;
  text-align:right;
}

.met{color:green;font-weight:bold;}
.missed{color:red;font-weight:bold;}

.donut-wrapper{
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
}

.donut-center{
  position:absolute;
  font-size:28px;
  font-weight:bold;
}

/* AI Drawer */
.ai-drawer{
  position:fixed;
  right:0;
  top:0;
  width:300px;
  height:100vh;
  background:#fff;
  box-shadow:-2px 0 10px rgba(0,0,0,0.1);
  display:none;
  flex-direction:column;
}

.ai-content{
  flex:1;
  display:flex;
  flex-direction:column;
  padding:12px;
}

.ai-input{
  margin-top:auto;
}

textarea{
  width:100%;
  height:80px;
}

/* Button */
.ask-ai-btn{
  position:fixed;
  bottom:16px;
  right:16px;
  background:#6c63ff;
  color:#fff;
  border:none;
  padding:10px 16px;
  border-radius:8px;
  cursor:pointer;
}

</style>
</head>

<body>

<div class="dashboard-container">

<h2>Defect Operations Dashboard</h2>

<div class="grid">

<div class="card">
<h3>Created vs Closed</h3>
<canvas id="trend"></canvas>
</div>

<div class="card sla-container">
<h3>4-Week Target Compliance</h3>

<div class="sla-summary">
<div class="met">Met: 34</div>
<div class="missed">Missed: 18</div>
</div>

<div class="donut-wrapper">
<canvas id="sla"></canvas>
<div class="donut-center">65%</div>
</div>

</div>

</div>

</div>

<!-- AI Drawer -->
<div class="ai-drawer" id="aiDrawer">
<div class="ai-content">
<h3>AI Insights</h3>

<div class="ai-input">
<textarea placeholder="Ask something..."></textarea>
<button>Generate</button>
</div>

</div>
</div>

<button class="ask-ai-btn" onclick="toggleAI()">Ask AI</button>

<script>

/* Charts */
new Chart(document.getElementById('trend'),{
type:'line',
data:{
labels:['Oct','Nov','Dec','Jan','Feb'],
datasets:[
{label:'Created',data:[10,15,20,18,14],borderColor:'blue'},
{label:'Closed',data:[12,14,18,22,11],borderColor:'green'}
]
}
});

new Chart(document.getElementById('sla'),{
type:'doughnut',
data:{
datasets:[{
data:[34,18],
backgroundColor:['green','#eee']
}]
},
options:{
cutout:'75%',
plugins:{legend:{display:false}}
}
});

/* AI */
function toggleAI(){
let el=document.getElementById('aiDrawer');
el.style.display= el.style.display==='flex' ? 'none' : 'flex';
}

</script>

</body>
</html>
